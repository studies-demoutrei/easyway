<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="icon" href="../../assets/icon.png">
    <link rel="stylesheet" href="index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyWay</title>
  </head>
  <body>
    <div id="blocker"><span>This app is only available on mobile.</span></div>
    <header>
      <div id="blueBlob"></div>
      <div id="container-greeting">
        <span id="container-greeting-text">
          Welcome back, <span id="user-firstName"></span>
        </span>
        <img id="icon" src="../../assets/icon.png"/>
      </div>
      <section id="container-balance">
        <div id="container-balance-title">Current Balance</div>
        <div id="container-balance-bal">&#8369;<span id="user-balance"></span></div>
        <div id="container-balance-lastUpdated">Last updated on <span id="user-lastUpdated"></span></div>
      </section>
    </header>
    <main>
      <section id="fundSource-section">
        <span class="section-heading">Select Fund Source</span>
        <span class="section-subtext">My accounts</span>
        <div id="fundSource-eWallet-container">
          <span>My eWallet</span>
          <span id="fundSource-eWallet-balance">&#8369; <span id="fundSource-eWallet-balance-amount"></span></span>
        </div>
        <span class="section-subtext">Other banks</span>
        <select id="fundSource-externalBank-select" name="externalBank">
          <option value="" disabled selected hidden>Select a bank</option>
        </select>
      </section>
    </main>
    <script type="module" src="index.js"></script>
    <script type="module">
      import { setupHook } from './index.js';

      setupHook();
    </script>
  </body>
</html>
