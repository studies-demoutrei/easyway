<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="icon" href="../../assets/icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>EasyWay</title>
  </head>
  <body theme="light">
    <div id="blocker"><span>This app is only available on mobile.</span></div>
    <header>
      <div id="blueBlob"></div>
      <div id="container-greeting">
        <span id="container-greeting-text">
          Welcome back, <span id="user-firstName"></span>
        </span>
        <img id="icon" src="../../assets/icon.png"/>
      </div>
      <section id="container-balance">
        <div id="container-balance-title">Current Balance</div>
        <div id="container-balance-bal">&#8369;<span id="user-balance"></span></div>
        <div id="container-balance-lastUpdated">Last updated on <span id="user-lastUpdated"></span></div>
      </section>
    </header>
    <main>
      <section>
        <span class="heading">Account Management</span>
        <button>Profile</button>
        <button>Update Proof of Billing/ID</button>
        <button>Digital Signature Specimen</button>
        <button>Upgrade Account</button>
      </section>
      <section>
        <span class="heading">Security</span>
        <button>Change Password</button>
        <button>Enable Biometric Login</button>
        <button>Two-factor Authentication</button>
        <button>Device Management</button>
        <button>Transaction Limits</button>
      </section>
      <section>
        <span class="heading">Notifications</span>
        <button>Push Notifications</button>
        <button>SMS/E-mail Alerts</button>
        <button>Custom Alerts</button>
      </section>
      <section>
        <span class="heading">Preferences</span>
        <button>Language</button>
        <button id="theme">Theme</button>
        <button>Quiz Action Customization</button>
      </section>
      <section>
        <span class="heading">Support</span>
        <button>Customer Service Hotline</button>
        <button>Chat support</button>
        <button>FAQs and Guides</button>
      </section>
      <section>
        <span class="heading">Legal and Compliance</span>
        <button id="termsAndConditions">Terms and Conditions</button>
        <button>Privacy Policy</button>
        <button>Regulatory Disclosures</button>
      </section>
      <section>
        <span class="heading">Logout and App Info</span>
        <button id="logout">Logout</button>
        <button id="appVersion">
          <span>App version</span>
          <span id="appVersion-v">1.204.6</span>
        </button>
        <button>Check for updates</button>
      </section>
    </main>
    <footer>
      <div class="pagination">
        <button id="pagination-home" class="pagination-button next">Home</button>
      </div>
    </footer>
    <script type="module" src="index.js"></script>
    <script type="module">
      import { setupHook } from './index.js';

      setupHook();
    </script>
  </body>
</html>
